server.port=8090
spring.datasource.url=jdbc:mysql://localhost:3306/ORM_DB?createDatabaseIfNotExist=true&useSSL=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.main.allow-circular-references=true

#swagger docs
spring-doc.paths-to-match=/user/**,/category/**,/login/**,/register/**,/project/**,/task/**,/users/**
spring-doc.packages-to-scan=com.oms.controller